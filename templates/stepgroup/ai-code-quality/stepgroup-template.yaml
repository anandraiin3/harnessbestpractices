template:
  name: Code Quality Checks Using AI Agent
  identifier: Check_Code_Quality_Using_AI
  versionLabel: v4
  type: StepGroup
  orgIdentifier: default
  tags: {}
  description: "AI code quality scanner (OpenAI / Anthropic / Gemini). Runs standard scan on every build; full-audit on PRs to main. Quality gate thresholds are enforced directly by the step. Image: anandraiin3/harness-code-quality:latest | Docs: https://github.com/anandraiin3/harness-code-quality"
  spec:
    stageType: CI
    variables: []
    steps:
      - step:
          type: Plugin
          name: AI Code Quality Check
          identifier: AI_Code_Quality_Check
          spec:
            connectorRef: account.Dockerhub
            image: anandraiin3/harness-code-quality:latest
            privileged: false
            settings:
              llm_provider: <+input>
              api_key: <+input>
              model: <+input>
              prompt_preset: standard
              scan_paths: <+input>
              file_extensions: <+input>
              max_files: <+input>
              timeout_seconds: <+input>
              # Quality gate — standard scan enforces scores; critical blocking is lenient
              # to avoid false positives on non-PR builds. Adjust as needed.
              fail_on_critical: "false"
              fail_on_severity: "high"
              min_overall_score: "6"
              min_security_score: "7"
              min_reliability_score: "7"
              min_maintainability_score: "6"
              min_performance_score: "6"
            outputVariables:
              - name: PROMPT_PRESET
              - name: OVERALL_SCORE
              - name: MAINTAINABILITY_SCORE
              - name: SECURITY_SCORE
              - name: PERFORMANCE_SCORE
              - name: RELIABILITY_SCORE
              - name: TESTABILITY_SCORE
              - name: COMPLEXITY_SCORE
              - name: DUPLICATION_SCORE
              - name: CODE_SMELLS
              - name: CRITICAL_ISSUES
              - name: SEVERITY
              - name: DEBT_HOURS_ESTIMATE
              - name: FINDINGS_COUNT
              - name: TOP_FINDING
              - name: TOP_RECOMMENDATION
              - name: SUMMARY
          when:
            stageStatus: Success
            condition: <+codebase.prNumber> == null || <+codebase.targetBranch> != "main"
      - step:
          type: Plugin
          name: AI Code Quality Full Audit
          identifier: AI_Code_Quality_Full_Audit
          spec:
            connectorRef: account.Dockerhub
            image: anandraiin3/harness-code-quality:latest
            privileged: false
            settings:
              llm_provider: <+input>
              api_key: <+input>
              model: <+input>
              prompt_preset: full-audit
              scan_paths: <+input>
              file_extensions: <+input>
              max_files: <+input>
              max_chars: "200000"
              timeout_seconds: <+input>
              # Quality gate — full audit enforces all thresholds strictly before merge to main
              fail_on_critical: "true"
              fail_on_severity: "high"
              min_overall_score: "6"
              min_security_score: "7"
              min_reliability_score: "7"
              min_maintainability_score: "6"
              min_performance_score: "6"
              min_testability_score: "5"
              min_complexity_score: "5"
              min_duplication_score: "6"
            outputVariables:
              - name: PROMPT_PRESET
              - name: OVERALL_SCORE
              - name: MAINTAINABILITY_SCORE
              - name: SECURITY_SCORE
              - name: PERFORMANCE_SCORE
              - name: RELIABILITY_SCORE
              - name: TESTABILITY_SCORE
              - name: COMPLEXITY_SCORE
              - name: DUPLICATION_SCORE
              - name: CODE_SMELLS
              - name: CRITICAL_ISSUES
              - name: SEVERITY
              - name: DEBT_HOURS_ESTIMATE
              - name: FINDINGS_COUNT
              - name: TOP_FINDING
              - name: TOP_RECOMMENDATION
              - name: SUMMARY
          when:
            stageStatus: Success
            condition: <+codebase.prNumber> != null && <+codebase.targetBranch> == "main"
    when:
      stageStatus: Success
